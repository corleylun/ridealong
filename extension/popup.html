<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font: 13px system-ui, sans-serif; width: 260px; margin: 0; padding: 12px; }
    h1 { font-size: 14px; margin: 0 0 8px; }
    label { display: block; margin: 8px 0 2px; color: #555; }
    input { width: 100%; box-sizing: border-box; padding: 5px; }
    .row { display: flex; gap: 6px; margin-top: 10px; }
    button { flex: 1; padding: 6px; cursor: pointer; }
    #status { margin-top: 10px; padding: 6px; border-radius: 4px; text-align: center; font-weight: 600; }
    .connected { background: #e6f4ea; color: #137333; }
    .disconnected, .error { background: #fce8e6; color: #c5221f; }
    .connecting { background: #fef7e0; color: #b06000; }
    .hint { color: #888; font-size: 11px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Firefox MCP Bridge</h1>
  <label>Port</label>
  <input id="port" type="number" value="8765" />
  <label>Token</label>
  <input id="token" type="text" placeholder="paste token from the bridge" />
  <div class="row">
    <button id="connect">Save &amp; Connect</button>
    <button id="disconnect">Disconnect</button>
  </div>
  <div id="status" class="disconnected">disconnected</div>
  <div class="hint">The bridge prints the token on startup (and saves it to
    ~/.firefox-mcp/token.txt). Localhost only.</div>
  <script src="popup.js"></script>
</body>
</html>
